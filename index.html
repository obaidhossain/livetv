<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live TV</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  </head>
  <body class="h-full bg-gray-950 text-white font-sans antialiased">
    <div id="app" class="flex flex-col h-full">
      <header class="flex items-center justify-between px-4 py-3 bg-gray-900 border-b border-gray-800 shrink-0">
        <div class="flex items-center gap-3">
          <h1 class="text-xl font-bold tracking-tight text-white">Live TV</h1>
          <span id="channel-count" class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded-full"></span>
        </div>
        <div class="flex items-center gap-3">
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input
              id="search-input"
              type="text"
              placeholder="Search channels..."
              class="w-56 pl-9 pr-3 py-1.5 text-sm bg-gray-800 border border-gray-700 rounded-lg text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            />
          </div>
          <select id="category-filter" class="text-sm bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent cursor-pointer">
            <option value="">All Categories</option>
          </select>
          <button id="live-toggle" class="flex items-center gap-1.5 text-xs bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-gray-400 hover:text-gray-200 hover:border-gray-600 transition-colors" title="Show only live channels">
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
            Live
          </button>
        </div>
      </header>

      <main class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="w-80 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0 overflow-hidden">
          <div id="channel-list" class="flex-1 overflow-y-auto [&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-track]:bg-transparent [&::-webkit-scrollbar-thumb]:bg-gray-700 [&::-webkit-scrollbar-thumb]:rounded-full">
            <div id="loading" class="flex items-center justify-center h-full">
              <div class="flex flex-col items-center gap-3">
                <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm text-gray-500">Loading channels...</p>
              </div>
            </div>
          </div>
        </aside>

        <section id="player-section" class="flex-1 flex flex-col bg-black">
          <div id="player-container" class="flex-1 flex items-center justify-center relative">
            <video id="video-player" class="w-full h-full object-contain" controls autoplay playsinline></video>
            <div id="no-channel" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600">
              <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              <p class="text-lg font-medium">Select a channel to start watching</p>
              <p class="text-sm mt-1">Choose from the list on the left</p>
            </div>
            <div id="stream-error" class="hidden absolute inset-0 flex flex-col items-center justify-center text-red-400 bg-black/80">
              <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
              <p class="text-base font-medium">Unable to play this channel</p>
              <p class="text-sm mt-1 text-gray-400">The stream may be offline or unavailable</p>
            </div>
          </div>
          <div id="channel-info" class="hidden px-5 py-3 bg-gray-900 border-t border-gray-800">
            <div class="flex items-center gap-3">
              <img id="channel-logo" class="w-10 h-10 rounded-lg object-cover bg-gray-800" alt="" />
              <div>
                <p id="channel-name" class="text-sm font-semibold text-white"></p>
                <p id="channel-group" class="text-xs text-gray-500"></p>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
