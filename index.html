<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Live TV</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  </head>
  <body class="h-full bg-gray-950 text-white font-sans antialiased [padding-bottom:env(safe-area-inset-bottom)]">
    <div id="app" class="flex flex-col h-full">
      <header class="flex items-center justify-between px-3 md:px-4 py-2 md:py-3 bg-gray-900 border-b border-gray-800 shrink-0 gap-2">
        <div class="flex items-center gap-2 md:gap-3">
          <button id="menu-toggle" class="lg:hidden p-2 text-gray-400 hover:text-white transition-colors" aria-label="Toggle menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="text-lg md:text-xl font-bold tracking-tight text-white">Live TV</h1>
          <span id="channel-count" class="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded-full hidden md:inline-block"></span>
        </div>
        <div class="flex items-center gap-2 md:gap-3 flex-1 justify-end">
          <div class="relative flex-1 max-w-[160px] md:max-w-[200px] lg:max-w-[240px]">
            <svg class="absolute left-2.5 md:left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 md:w-4 md:h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input
              id="search-input"
              type="search"
              placeholder="Search..."
              class="w-full pl-8 md:pl-9 pr-2 md:pr-3 py-1.5 text-sm bg-gray-800 border border-gray-700 rounded-lg text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            />
          </div>
          <select id="category-filter" class="text-xs md:text-sm bg-gray-800 border border-gray-700 rounded-lg px-2 md:px-3 py-1.5 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent cursor-pointer max-w-[120px] md:max-w-none">
            <option value="">All</option>
          </select>
          <button id="live-toggle" class="flex items-center gap-1 md:gap-1.5 text-xs bg-gray-800 border border-gray-700 rounded-lg px-2 md:px-3 py-1.5 text-gray-400 hover:text-gray-200 hover:border-gray-600 transition-colors shrink-0" title="Show only live channels">
            <span class="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-green-500"></span>
            <span class="hidden sm:inline">Live</span>
          </button>
        </div>
      </header>

      <main class="flex flex-1 overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-[280px] bg-gray-900 border-r border-gray-800 flex flex-col shrink-0 overflow-hidden transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out">
          <div class="flex items-center justify-between p-3 border-b border-gray-800 lg:hidden">
            <h2 class="text-sm font-semibold text-gray-300">Channels</h2>
            <button id="close-sidebar" class="p-2 text-gray-400 hover:text-white transition-colors" aria-label="Close menu">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div id="channel-list" class="flex-1 overflow-y-auto [&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-track]:bg-transparent [&::-webkit-scrollbar-thumb]:bg-gray-700 [&::-webkit-scrollbar-thumb]:rounded-full">
            <div id="loading" class="flex items-center justify-center h-full">
              <div class="flex flex-col items-center gap-3">
                <div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm text-gray-500">Loading channels...</p>
              </div>
            </div>
          </div>
        </aside>

        <section id="player-section" class="flex-1 flex flex-col bg-black w-full">
          <div id="player-container" class="flex-1 flex items-center justify-center relative">
            <video id="video-player" class="w-full h-full object-contain" controls autoplay playsinline></video>
            <div id="no-channel" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600 px-4">
              <svg class="w-12 h-12 md:w-16 md:h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              <p class="text-base md:text-lg font-medium text-center">Select a channel to start watching</p>
              <p class="text-sm mt-1 text-center">Choose from the menu</p>
              <button id="open-channel-list" class="mt-4 px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition-colors lg:hidden">
                Browse Channels
              </button>
            </div>
            <div id="stream-error" class="hidden absolute inset-0 flex flex-col items-center justify-center text-red-400 bg-black/80 px-4">
              <svg class="w-10 h-10 md:w-12 md:h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
              <p class="text-sm md:text-base font-medium text-center">Unable to play this channel</p>
              <p class="text-sm mt-1 text-gray-400 text-center">The stream may be offline or unavailable</p>
            </div>
          </div>
          <div id="channel-info" class="hidden px-3 md:px-5 py-2 md:py-3 bg-gray-900 border-t border-gray-800">
            <div class="flex items-center gap-2 md:gap-3">
              <img id="channel-logo" class="w-8 h-8 md:w-10 md:h-10 rounded-lg object-cover bg-gray-800 shrink-0" alt="" />
              <div class="min-w-0 flex-1">
                <p id="channel-name" class="text-sm font-semibold text-white truncate"></p>
                <p id="channel-group" class="text-xs text-gray-500 truncate"></p>
              </div>
            </div>
          </div>
        </section>
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 lg:hidden hidden"></div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
